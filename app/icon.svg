  />
  <!-- / slash (smaller) -->
  <line
    x1="27" y1="11"
    x2="23" y2="21"
    stroke="#dc3545"
    stroke-width="2.5"
    stroke-linecap="round"
  />
  <!-- > closing bracket (smaller) -->
  <polyline
    points="31,11 36,16 31,21"
    fill="none"
    stroke="#dc3545"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
