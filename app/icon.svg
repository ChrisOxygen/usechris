<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 32" width="40" height="32">
  <!-- < opening bracket (smaller) -->
  <polyline
    points="7,11 2,16 7,21"
    fill="none"
    stroke="#dc3545"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- C (taller than brackets) -->
  <path
    d="M20,4 C18,4 11,7 11,16 C11,25 18,28 20,28"
    fill="none"
    stroke="#0b0808"
    stroke-width="2.8"
